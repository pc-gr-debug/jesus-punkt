# Daily rebuild so ChurchTools events + the flyer stay fresh (site hosts on Vercel;
# pushes deploy via the Vercel git integration — this cron only covers content drift).
# Requires the VERCEL_DEPLOY_HOOK secret (Vercel → Project → Settings → Git → Deploy Hooks).
name: Daily Vercel rebuild

on:
  schedule:
    - cron: '0 4 * * *'  # UTC
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel deploy hook
        run: |
          if [ -z "${{ secrets.VERCEL_DEPLOY_HOOK }}" ]; then
            echo "::error::VERCEL_DEPLOY_HOOK secret is not set"; exit 1
          fi
          curl -sf -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
